<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboCompagnon - Ultra Réaliste</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        
        /* Fond avec grille futuriste */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(26, 26, 46, 0.95), rgba(26, 26, 46, 0.95)),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 255, 0.03) 2px,
                    rgba(0, 255, 255, 0.03) 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 255, 0.03) 2px,
                    rgba(0, 255, 255, 0.03) 4px
                );
            background-size: 100% 100%, 50px 50px, 50px 50px;
            z-index: 0;
        }
        
        .light-beam {
            position: fixed;
            top: -50%;
            left: 50%;
            width: 500px;
            height: 500px;
            background: radial-gradient(ellipse, 
                rgba(0, 255, 255, 0.15) 0%,
                transparent 70%);
            transform: translateX(-50%);
            filter: blur(40px);
            animation: beam-move 8s ease-in-out infinite;
        }
        
        @keyframes beam-move {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(100px); }
        }
        
        .container {
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(0, 255, 255, 0.1),
                0 0 100px rgba(0, 255, 255, 0.1);
            max-width: 700px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        
        .robot-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
        }
        
        /* === ROBOT RÉALISTE 3D === */
        .robot-3d {
            perspective: 1500px;
            perspective-origin: 50% 50%;
        }
        
        .robot {
            position: relative;
            width: 320px;
            height: 480px;
            transform-style: preserve-3d;
            animation: robot-float 7s ease-in-out infinite;
            filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.8));
        }
        
        @keyframes robot-float {
            0%, 100% { 
                transform: translateY(0) rotateX(0deg) rotateY(0deg);
            }
            25% {
                transform: translateY(-15px) rotateX(2deg) rotateY(-3deg);
            }
            50% {
                transform: translateY(-25px) rotateX(0deg) rotateY(3deg);
            }
            75% {
                transform: translateY(-15px) rotateX(-2deg) rotateY(-3deg);
            }
        }
        
        /* Antenne métallique */
        .antenna-base {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 60px;
            background: linear-gradient(180deg,
                #b8c6db 0%,
                #8a94a3 50%,
                #5e6875 100%);
            border-radius: 6px;
            box-shadow: 
                inset -2px 0 8px rgba(0, 0, 0, 0.5),
                inset 2px 0 8px rgba(255, 255, 255, 0.3),
                0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        .antenna-light {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 28px;
            background: 
                radial-gradient(circle at 35% 35%,
                    rgba(0, 255, 255, 1) 0%,
                    rgba(0, 200, 255, 0.8) 30%,
                    rgba(0, 150, 255, 0.6) 60%,
                    transparent 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 1),
                0 0 60px rgba(0, 255, 255, 0.6),
                0 0 90px rgba(0, 255, 255, 0.3),
                inset 0 0 10px rgba(255, 255, 255, 0.5);
            animation: antenna-glow 2s ease-in-out infinite;
        }
        
        @keyframes antenna-glow {
            0%, 100% {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translateX(-50%) scale(1.2);
                opacity: 0.8;
            }
        }
        
        /* Tête métallique réaliste */
        .head-3d {
            width: 260px;
            height: 280px;
            background: 
                linear-gradient(145deg,
                    #f0f4f8 0%,
                    #d9e2ec 20%,
                    #bcccdc 40%,
                    #9fb3c8 60%,
                    #829ab1 80%,
                    #627d98 100%);
            border-radius: 50px 50px 45px 45px;
            position: relative;
            margin: 0 auto;
            box-shadow: 
                0 25px 70px rgba(0, 0, 0, 0.6),
                inset -10px -10px 30px rgba(0, 0, 0, 0.3),
                inset 10px 10px 30px rgba(255, 255, 255, 0.5),
                inset 0 0 50px rgba(255, 255, 255, 0.1),
                0 0 0 3px rgba(0, 255, 255, 0.2);
            transform-style: preserve-3d;
        }
        
        /* Reflets métalliques sur la tête */
        .head-3d::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            height: 50%;
            background: 
                linear-gradient(135deg,
                    rgba(255, 255, 255, 0.4) 0%,
                    rgba(255, 255, 255, 0.2) 30%,
                    transparent 60%);
            border-radius: 40px 40px 0 0;
            pointer-events: none;
            filter: blur(1px);
        }
        
        .head-3d::after {
            content: '';
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            height: 30%;
            background: 
                linear-gradient(180deg,
                    transparent 0%,
                    rgba(0, 0, 0, 0.2) 100%);
            border-radius: 0 0 30px 30px;
            pointer-events: none;
        }
        
        /* Panneau d'écran LCD réaliste */
        .screen-panel {
            width: 200px;
            height: 150px;
            background: 
                linear-gradient(145deg,
                    #0a0e1a 0%,
                    #151922 50%,
                    #0a0e1a 100%);
            border-radius: 20px;
            position: absolute;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 
                inset 0 10px 25px rgba(0, 0, 0, 0.9),
                inset 0 -2px 15px rgba(255, 255, 255, 0.05),
                0 5px 20px rgba(0, 255, 255, 0.3),
                inset 0 0 50px rgba(0, 255, 255, 0.05);
            border: 3px solid #1a1d2e;
        }
        
        /* Effet de scan LCD */
        .screen-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(0, 255, 255, 0.15) 50%,
                transparent 100%);
            animation: lcd-scan 5s linear infinite;
        }
        
        @keyframes lcd-scan {
            0% { left: -100%; }
            100% { left: 200%; }
        }
        
        /* Lignes LCD */
        .screen-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent 0px,
                rgba(0, 0, 0, 0.3) 1px,
                transparent 2px
            );
            pointer-events: none;
        }
        
        /* Yeux LCD réalistes */
        .eyes-display {
            display: flex;
            gap: 50px;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.8));
        }
        
        .eye-lcd {
            width: 42px;
            height: 42px;
            background: 
                radial-gradient(ellipse at 35% 35%,
                    #00ffff 0%,
                    #00ccff 20%,
                    #0099ff 40%,
                    #0066cc 60%,
                    #003399 80%,
                    #001a4d 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 
                0 0 25px rgba(0, 255, 255, 1),
                0 0 50px rgba(0, 255, 255, 0.6),
                inset 0 3px 15px rgba(255, 255, 255, 0.4),
                inset 0 -3px 10px rgba(0, 0, 0, 0.5);
            animation: eye-pulse 4s infinite;
            border: 2px solid rgba(0, 255, 255, 0.3);
        }
        
        /* Reflet de lumière dans l'œil */
        .eye-lcd::after {
            content: '';
            width: 16px;
            height: 16px;
            background: 
                radial-gradient(circle,
                    rgba(255, 255, 255, 0.9) 0%,
                    rgba(255, 255, 255, 0.6) 50%,
                    transparent 100%);
            border-radius: 50%;
            position: absolute;
            top: 8px;
            left: 10px;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        
        @keyframes eye-pulse {
            0%, 100% {
                box-shadow: 
                    0 0 25px rgba(0, 255, 255, 1),
                    0 0 50px rgba(0, 255, 255, 0.6),
                    inset 0 3px 15px rgba(255, 255, 255, 0.4),
                    inset 0 -3px 10px rgba(0, 0, 0, 0.5);
            }
            50% {
                box-shadow: 
                    0 0 35px rgba(0, 255, 255, 1),
                    0 0 70px rgba(0, 255, 255, 0.8),
                    inset 0 3px 15px rgba(255, 255, 255, 0.6),
                    inset 0 -3px 10px rgba(0, 0, 0, 0.5);
            }
        }
        
        /* États des yeux */
        .robot.listening .eye-lcd {
            animation: eye-tracking 2s infinite ease-in-out;
        }
        
        @keyframes eye-tracking {
            0%, 100% { transform: translateX(0) translateY(0) scale(1); }
            25% { transform: translateX(-5px) translateY(-3px) scale(1.05); }
            50% { transform: translateX(0) translateY(5px) scale(1); }
            75% { transform: translateX(5px) translateY(-3px) scale(1.05); }
        }
        
        .robot.thinking .eye-lcd {
            animation: eye-process 1s infinite;
        }
        
        @keyframes eye-process {
            0%, 100% { 
                transform: scale(1) rotate(0deg);
                filter: brightness(1);
            }
            25% { 
                transform: scale(0.95) rotate(-5deg);
                filter: brightness(1.2);
            }
            50% { 
                transform: scale(1.05) rotate(5deg);
                filter: brightness(0.8);
            }
            75% { 
                transform: scale(0.95) rotate(-3deg);
                filter: brightness(1.1);
            }
        }
        
        .robot.speaking .eye-lcd {
            animation: eye-active 0.5s infinite;
        }
        
        @keyframes eye-active {
            0%, 100% {
                transform: scale(1);
                box-shadow: 
                    0 0 25px rgba(0, 255, 255, 1),
                    0 0 50px rgba(0, 255, 255, 0.6);
            }
            50% {
                transform: scale(1.15);
                box-shadow: 
                    0 0 40px rgba(0, 255, 255, 1),
                    0 0 80px rgba(0, 255, 255, 0.8);
            }
        }
        
        /* Bouche LCD */
        .mouth-lcd {
            width: 80px;
            height: 10px;
            background: linear-gradient(90deg,
                #00ffff 0%,
                #00ccff 50%,
                #00ffff 100%);
            border-radius: 5px;
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.3s ease;
            box-shadow: 
                0 0 15px rgba(0, 255, 255, 0.8),
                inset 0 1px 5px rgba(255, 255, 255, 0.3);
        }
        
        .robot.idle .mouth-lcd {
            width: 60px;
            height: 8px;
        }
        
        .robot.listening .mouth-lcd {
            width: 70px;
            height: 15px;
            border-radius: 0 0 35px 35px;
        }
        
        .robot.speaking .mouth-lcd {
            animation: mouth-talk 0.4s infinite;
        }
        
        @keyframes mouth-talk {
            0%, 100% {
                height: 10px;
                width: 80px;
                border-radius: 5px;
                box-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            }
            50% {
                height: 32px;
                width: 65px;
                border-radius: 50%;
                box-shadow: 0 0 30px rgba(0, 255, 255, 1);
            }
        }
        
        .robot.thinking .mouth-lcd {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 5px solid #00ffff;
            background: transparent;
            border-top-color: transparent;
            animation: mouth-spin 1.2s linear infinite;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }
        
        @keyframes mouth-spin {
            to { transform: translateX(-50%) rotate(360deg); }
        }
        
        /* Corps métallique */
        .body-metal {
            width: 220px;
            height: 130px;
            background: 
                linear-gradient(145deg,
                    #f0f4f8 0%,
                    #d9e2ec 25%,
                    #bcccdc 50%,
                    #829ab1 75%,
                    #627d98 100%);
            border-radius: 35px;
            margin: 30px auto 0;
            position: relative;
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.5),
                inset 0 -8px 20px rgba(0, 0, 0, 0.3),
                inset 0 8px 20px rgba(255, 255, 255, 0.4),
                0 0 0 3px rgba(0, 255, 255, 0.2);
            transform-style: preserve-3d;
        }
        
        /* Reflet sur le corps */
        .body-metal::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 35%;
            background: linear-gradient(135deg,
                rgba(255, 255, 255, 0.3) 0%,
                transparent 100%);
            border-radius: 25px 25px 0 0;
            pointer-events: none;
        }
        
        /* LED de statut réaliste */
        .status-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            position: absolute;
            top: 25px;
            left: 25px;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 0 4px rgba(255, 255, 255, 0.2),
                inset 0 2px 5px rgba(255, 255, 255, 0.3),
                inset 0 -2px 5px rgba(0, 0, 0, 0.3);
        }
        
        .robot.idle .status-indicator {
            background: radial-gradient(circle at 30% 30%,
                #10b981 0%,
                #059669 50%,
                #047857 100%);
            box-shadow: 
                0 0 25px #10b981,
                0 0 50px rgba(16, 185, 129, 0.5),
                0 0 0 4px rgba(255, 255, 255, 0.2),
                inset 0 2px 5px rgba(255, 255, 255, 0.3);
        }
        
        .robot.listening .status-indicator {
            background: radial-gradient(circle at 30% 30%,
                #3b82f6 0%,
                #2563eb 50%,
                #1d4ed8 100%);
            box-shadow: 
                0 0 25px #3b82f6,
                0 0 50px rgba(59, 130, 246, 0.5),
                0 0 0 4px rgba(255, 255, 255, 0.2),
                inset 0 2px 5px rgba(255, 255, 255, 0.3);
            animation: indicator-pulse 1s infinite;
        }
        
        .robot.thinking .status-indicator {
            background: radial-gradient(circle at 30% 30%,
                #f59e0b 0%,
                #d97706 50%,
                #b45309 100%);
            box-shadow: 
                0 0 25px #f59e0b,
                0 0 50px rgba(245, 158, 11, 0.5),
                0 0 0 4px rgba(255, 255, 255, 0.2),
                inset 0 2px 5px rgba(255, 255, 255, 0.3);
            animation: indicator-pulse 0.6s infinite;
        }
        
        .robot.speaking .status-indicator {
            background: radial-gradient(circle at 30% 30%,
                #00ffff 0%,
                #00ccff 50%,
                #0099ff 100%);
            box-shadow: 
                0 0 30px #00ffff,
                0 0 60px rgba(0, 255, 255, 0.6),
                0 0 0 4px rgba(255, 255, 255, 0.2),
                inset 0 2px 5px rgba(255, 255, 255, 0.3);
            animation: indicator-pulse 0.4s infinite;
        }
        
        @keyframes indicator-pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.8;
            }
        }
        
        /* Grilles de ventilation */
        .vent {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 4px;
            background: 
                linear-gradient(90deg,
                    transparent 0%,
                    rgba(0, 0, 0, 0.3) 20%,
                    rgba(0, 0, 0, 0.5) 50%,
                    rgba(0, 0, 0, 0.3) 80%,
                    transparent 100%);
            border-radius: 2px;
            box-shadow: 
                inset 0 1px 2px rgba(0, 0, 0, 0.5),
                0 1px 1px rgba(255, 255, 255, 0.1);
        }
        
        .vent:nth-child(3) { top: 35px; width: 60px; }
        .vent:nth-child(4) { top: 45px; width: 45px; }
        .vent:nth-child(5) { top: 55px; width: 55px; }
        
        /* Panel de contrôle */
        .control-panel {
            background: rgba(20, 25, 40, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 20px;
            padding: 25px 30px;
            text-align: center;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(0, 255, 255, 0.2);
        }
        
        .status-display {
            font-size: 26px;
            font-weight: 900;
            color: #00ffff;
            margin-bottom: 8px;
            text-shadow: 
                0 0 10px rgba(0, 255, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.4);
            letter-spacing: 2px;
        }
        
        .status-info {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* Boutons de contrôle */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
        }
        
        button {
            padding: 18px 28px;
            border: 2px solid;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        button:hover::before {
            width: 400px;
            height: 400px;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.6);
        }
        
        button:active {
            transform: translateY(-1px);
        }
        
        .btn-idle {
            border-color: #10b981;
            color: #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        
        .btn-idle:hover {
            background: rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.5);
        }
        
        .btn-listening {
            border-color: #3b82f6;
            color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        
        .btn-listening:hover {
            background: rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
        }
        
        .btn-thinking {
            border-color: #f59e0b;
            color: #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
        }
        
        .btn-thinking:hover {
            background: rgba(245, 158, 11, 0.2);
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.5);
        }
        
        .btn-speaking {
            border-color: #00ffff;
            color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        
        .btn-speaking:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }
            
            .robot {
                transform: scale(0.8);
            }
            
            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="light-beam"></div>
    </div>
    
    <div class="container">
        <div class="robot-display">
            <!-- Robot 3D -->
            <div class="robot-3d">
                <div class="robot idle" id="robot">
                    <div class="antenna-base">
                        <div class="antenna-light"></div>
                    </div>
                    <div class="head-3d">
                        <div class="screen-panel">
                            <div class="eyes-display">
                                <div class="eye-lcd"></div>
                                <div class="eye-lcd"></div>
                            </div>
                        </div>
                        <div class="mouth-lcd"></div>
                    </div>
                    <div class="body-metal">
                        <div class="status-indicator"></div>
                        <div class="vent"></div>
                        <div class="vent"></div>
                        <div class="vent"></div>
                        <div class="vent"></div>
                    </div>
                </div>
            </div>
            
            <!-- Panel de contrôle -->
            <div class="control-panel">
                <div class="status-display" id="statusDisplay">STANDBY MODE</div>
                <div class="status-info" id="statusInfo">Awaiting instructions...</div>
            </div>
            
            <!-- Contrôles -->
            <div class="controls-grid">
                <button class="btn-idle" onclick="setState('idle')">💤 IDLE</button>
                <button class="btn-listening" onclick="setState('listening')">🎤 LISTEN</button>
                <button class="btn-thinking" onclick="setState('thinking')">🤔 PROCESS</button>
                <button class="btn-speaking" onclick="setState('speaking')">💬 SPEAK</button>
            </div>
        </div>
    </div>
    
    <script>
        const robot = document.getElementById('robot');
        const statusDisplay = document.getElementById('statusDisplay');
        const statusInfo = document.getElementById('statusInfo');
        
        const states = {
            idle: {
                display: 'STANDBY MODE',
                info: 'Awaiting instructions...'
            },
            listening: {
                display: 'LISTENING MODE',
                info: 'Audio input active...'
            },
            thinking: {
                display: 'PROCESSING',
                info: 'Computing response...'
            },
            speaking: {
                display: 'SPEAKING MODE',
                info: 'Audio output active...'
            }
        };
        
        function setState(state) {
            robot.className = 'robot ' + state;
            statusDisplay.textContent = states[state].display;
            statusInfo.textContent = states[state].info;
            
            if (state === 'speaking') {
                setTimeout(() => setState('idle'), 3500);
            }
        }
        
        // Séquence de démarrage
        window.addEventListener('load', () => {
            setTimeout(() => setState('listening'), 1000);
            setTimeout(() => setState('thinking'), 3000);
            setTimeout(() => setState('speaking'), 5000);
            setTimeout(() => setState('idle'), 8500);
        });
    </script>
</body>
</html>
